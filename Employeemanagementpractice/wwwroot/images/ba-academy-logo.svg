<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      .logo-text { font-family: 'Inter', 'Segoe UI', sans-serif; }
      .ba-bold { font-weight: 800; font-size: 48px; fill: #dc2626; }
      .academy-script { font-family: 'Brush Script MT', 'Segoe Script', cursive; font-size: 36px; fill: #dc2626; font-style: italic; }
    </style>
  </defs>
  <!-- B block -->
  <rect x="4" y="8" width="42" height="55" rx="6" fill="#dc2626"/>
  <rect x="12" y="16" width="18" height="10" rx="3" fill="#fff"/>
  <rect x="12" y="32" width="18" height="10" rx="3" fill="#fff"/>
  <rect x="30" y="16" width="8" height="10" rx="3" fill="#dc2626"/>
  <rect x="30" y="32" width="8" height="10" rx="3" fill="#dc2626"/>
  <!-- A block with arrow -->
  <rect x="52" y="8" width="42" height="55" rx="6" fill="#dc2626"/>
  <polygon points="62,48 73,20 84,48" fill="#fff"/>
  <rect x="66" y="37" width="12" height="4" fill="#dc2626"/>
  <!-- Arrow inside A -->
  <line x1="73" y1="28" x2="80" y2="20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="80,18 82,24 76,22" fill="#fff"/>
  <!-- Academy text -->
  <text x="105" y="52" class="academy-script">Academy</text>
</svg>